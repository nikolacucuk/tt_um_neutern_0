name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Verilator 5.036
        id: cache-verilator
        uses: actions/cache@v4
        with:
          path: /opt/verilator
          key: verilator-5.036-ubuntu24

      - name: Build Verilator 5.036
        if: steps.cache-verilator.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y git make autoconf g++ flex bison libfl2 libfl-dev
          git clone --depth 1 --branch v5.036 https://github.com/verilator/verilator /tmp/verilator_src
          cd /tmp/verilator_src && autoconf && ./configure --prefix=/opt/verilator
          make -j$(nproc) && sudo make install

      - name: Add Verilator to PATH
        run: echo "/opt/verilator/bin" >> $GITHUB_PATH

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Run tests
        run: |
          cd test
          make clean
          make SIM=verilator WAVES=0
          # make will return success even if the test fails, so check for failure in the results.xml
          ! grep failure results.xml

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*
